<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 1100" width="960" height="1100" font-family="Segoe UI,Arial,sans-serif">
<defs>
  <filter id="sh"><feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.09"/></filter>
  <marker id="ar"  markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#94a3b8"/></marker>
  <marker id="ag"  markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#16a34a"/></marker>
  <marker id="arc" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#dc2626"/></marker>
  <linearGradient id="hdr" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%"   stop-color="#0f2460"/>
    <stop offset="100%" stop-color="#5b21b6"/>
  </linearGradient>
  <linearGradient id="aibg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"   stop-color="#faf5ff"/>
    <stop offset="100%" stop-color="#ede9fe"/>
  </linearGradient>
  <linearGradient id="fbg" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%"   stop-color="#1e3a8a"/>
    <stop offset="100%" stop-color="#2563eb"/>
  </linearGradient>
</defs>

<!-- Page background -->
<rect width="960" height="1100" fill="#f1f5f9"/>

<!-- HEADER -->
<rect width="960" height="90" fill="url(#hdr)"/>
<circle cx="856" cy="24" r="3" fill="rgba(255,255,255,0.10)"/>
<circle cx="880" cy="24" r="3" fill="rgba(255,255,255,0.10)"/>
<circle cx="904" cy="24" r="3" fill="rgba(255,255,255,0.10)"/>
<circle cx="856" cy="48" r="3" fill="rgba(255,255,255,0.10)"/>
<circle cx="880" cy="48" r="3" fill="rgba(255,255,255,0.10)"/>
<circle cx="904" cy="48" r="3" fill="rgba(255,255,255,0.10)"/>
<circle cx="856" cy="72" r="3" fill="rgba(255,255,255,0.10)"/>
<circle cx="880" cy="72" r="3" fill="rgba(255,255,255,0.10)"/>
<circle cx="904" cy="72" r="3" fill="rgba(255,255,255,0.10)"/>
<text x="480" y="42" text-anchor="middle" fill="white"   font-size="21"   font-weight="800">&#127806;  Kisan Mausam Alert &#8212; How It Works</text>
<text x="480" y="68" text-anchor="middle" fill="#c4b5fd" font-size="12.5">Fully automated pipeline &#183; No human trigger &#183; Monitors every day &#183; Alerts only when there is real risk</text>

<!-- ══ STEP 1: Automated Monitor ══ -->
<rect x="60" y="106" width="840" height="80" rx="14" fill="white" filter="url(#sh)"/>
<rect x="60" y="106" width="5"   height="80" rx="2.5" fill="#2563eb"/>
<circle cx="104" cy="146" r="19" fill="#2563eb"/>
<text x="104" y="151" text-anchor="middle" fill="white" font-size="13" font-weight="800">1</text>
<text x="138" y="132" fill="#1e293b" font-size="14" font-weight="700">&#9201;  Automated Pipeline &#8212; Watches Weather Every Day, Every District</text>
<text x="138" y="154" fill="#64748b" font-size="12">No human trigger needed. Runs silently on a schedule. Checks forecasts against risk thresholds.</text>
<text x="138" y="174" fill="#64748b" font-size="12">If something is coming &#8212; it acts. If the week is safe &#8212; nobody gets disturbed.</text>
<line x1="480" y1="186" x2="480" y2="214" stroke="#94a3b8" stroke-width="2" marker-end="url(#ar)"/>

<!-- ══ STEP 2 label ══ -->
<rect x="318" y="220" width="324" height="20" rx="10" fill="#e2e8f0"/>
<text x="480" y="234" text-anchor="middle" fill="#64748b" font-size="10.5" font-weight="700">STEP 2  &#183;  COLLECT LIVE GOVERNMENT DATA</text>

<!-- Data card: IMD -->
<rect x="60"  y="250" width="258" height="104" rx="12" fill="white" filter="url(#sh)"/>
<rect x="60"  y="250" width="258" height="4"   rx="2"  fill="#0891b2"/>
<text x="189" y="292" text-anchor="middle" fill="#0e7490" font-size="13" font-weight="700">&#128225;  IMD Official Warnings</text>
<text x="189" y="312" text-anchor="middle" fill="#64748b" font-size="11">Govt of India live feed</text>
<text x="189" y="330" text-anchor="middle" fill="#94a3b8" font-size="10.5">Heatwave &#183; Flood &#183; Cyclone</text>
<text x="189" y="346" text-anchor="middle" fill="#94a3b8" font-size="10">mausam.imd.gov.in</text>

<!-- Data card: Forecast -->
<rect x="351" y="250" width="258" height="104" rx="12" fill="white" filter="url(#sh)"/>
<rect x="351" y="250" width="258" height="4"   rx="2"  fill="#0891b2"/>
<text x="480" y="292" text-anchor="middle" fill="#0e7490" font-size="13" font-weight="700">&#127780;  7-Day Weather Forecast</text>
<text x="480" y="312" text-anchor="middle" fill="#64748b" font-size="11">Temp &#183; Rain &#183; Wind &#183; UV Index</text>
<text x="480" y="330" text-anchor="middle" fill="#94a3b8" font-size="10.5">Open-Meteo (free, real-time)</text>
<text x="480" y="346" text-anchor="middle" fill="#94a3b8" font-size="10">Per district, updated daily</text>

<!-- Data card: Crops -->
<rect x="642" y="250" width="258" height="104" rx="12" fill="white" filter="url(#sh)"/>
<rect x="642" y="250" width="258" height="4"   rx="2"  fill="#0891b2"/>
<text x="771" y="292" text-anchor="middle" fill="#0e7490" font-size="13" font-weight="700">&#127806;  District Crop Calendar</text>
<text x="771" y="312" text-anchor="middle" fill="#64748b" font-size="11">data.gov.in Agriculture API</text>
<text x="771" y="330" text-anchor="middle" fill="#94a3b8" font-size="10.5">Rabi &#183; Kharif &#183; Zaid season</text>
<text x="771" y="346" text-anchor="middle" fill="#94a3b8" font-size="10">Auto crop detection per district</text>

<!-- Converging arrows -->
<line x1="189" y1="354" x2="189" y2="380" stroke="#94a3b8" stroke-width="1.5"/>
<line x1="480" y1="354" x2="480" y2="380" stroke="#94a3b8" stroke-width="1.5"/>
<line x1="771" y1="354" x2="771" y2="380" stroke="#94a3b8" stroke-width="1.5"/>
<line x1="189" y1="380" x2="771" y2="380" stroke="#94a3b8" stroke-width="1.5"/>
<line x1="480" y1="380" x2="480" y2="406" stroke="#94a3b8" stroke-width="2" marker-end="url(#ar)"/>

<!-- ══ STEP 3: AI Engine ══ -->
<rect x="60" y="412" width="840" height="138" rx="14" fill="url(#aibg)" filter="url(#sh)" stroke="#7c3aed" stroke-width="1.5"/>
<rect x="60" y="412" width="5"   height="138" rx="2.5" fill="#7c3aed"/>
<circle cx="104" cy="481" r="19" fill="#7c3aed"/>
<text x="104" y="486" text-anchor="middle" fill="white" font-size="13" font-weight="800">3</text>
<text x="138" y="438" fill="#3b0764" font-size="14" font-weight="700">&#129302;  AI Engine &#8212; Reads All Data, Thinks Like an Agricultural Expert</text>
<circle cx="148" cy="460" r="3.5" fill="#7c3aed"/><text x="162" y="465" fill="#4c1d95" font-size="12">Spots risks: heatwave, heavy rain, cold wave, thunderstorm, high winds</text>
<circle cx="148" cy="484" r="3.5" fill="#7c3aed"/><text x="162" y="489" fill="#4c1d95" font-size="12">Knows which crops are in the ground this season &#8212; advice is specific, not generic</text>
<circle cx="148" cy="508" r="3.5" fill="#7c3aed"/><text x="162" y="513" fill="#4c1d95" font-size="12">Writes practical advice: irrigate at dawn, shelter cattle, delay harvest, hold pesticide spraying</text>
<circle cx="148" cy="532" r="3.5" fill="#7c3aed"/><text x="162" y="537" fill="#4c1d95" font-size="12">Translates into the farmer&#8217;s own language &#8212; native script, plain words, zero jargon</text>
<line x1="480" y1="550" x2="480" y2="578" stroke="#94a3b8" stroke-width="2" marker-end="url(#ar)"/>

<!-- ══ STEP 4: Decision Diamond ══ -->
<text x="480" y="596" text-anchor="middle" fill="#92400e" font-size="10.5" font-weight="700">STEP 4  &#183;  SMART DECISION</text>
<polygon points="480,610  622,660  480,710  338,660" fill="#fffbeb" stroke="#d97706" stroke-width="2.5" filter="url(#sh)"/>
<text x="480" y="652" text-anchor="middle" fill="#92400e" font-size="13" font-weight="800">Is there a real risk</text>
<text x="480" y="672" text-anchor="middle" fill="#92400e" font-size="13" font-weight="800">worth acting on?</text>

<!-- YES &#8594; down -->
<line x1="480" y1="710" x2="480" y2="748" stroke="#16a34a" stroke-width="2.5" marker-end="url(#ag)"/>
<rect x="432" y="714" width="44" height="22" rx="11" fill="#dcfce7"/>
<text x="454" y="729" text-anchor="middle" fill="#15803d" font-size="11" font-weight="700">YES</text>

<!-- NO &#8594; right -->
<line x1="622" y1="660" x2="806" y2="660" stroke="#dc2626" stroke-width="2.5" marker-end="url(#arc)"/>
<rect x="634" y="646" width="38" height="22" rx="11" fill="#fee2e2"/>
<text x="653" y="661" text-anchor="middle" fill="#dc2626" font-size="11" font-weight="700">NO</text>
<rect x="806" y="630" width="140" height="62" rx="12" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5" filter="url(#sh)"/>
<text x="876" y="654" text-anchor="middle" fill="#dc2626"  font-size="13" font-weight="700">No Alert Sent</text>
<text x="876" y="672" text-anchor="middle" fill="#991b1b" font-size="11">Farmer not disturbed</text>
<text x="876" y="688" text-anchor="middle" fill="#94a3b8"  font-size="10.5">Quiet = good news</text>

<!-- ══ STEP 5 label ══ -->
<rect x="318" y="754" width="324" height="20" rx="10" fill="#e2e8f0"/>
<text x="480" y="768" text-anchor="middle" fill="#64748b" font-size="10.5" font-weight="700">STEP 5  &#183;  DELIVER TO FARMER&#8217;S PHONE</text>

<!-- Delivery: WhatsApp -->
<rect x="60"  y="782" width="400" height="88" rx="12" fill="white" filter="url(#sh)"/>
<rect x="60"  y="782" width="400" height="4"  rx="2"  fill="#16a34a"/>
<text x="260" y="820" text-anchor="middle" fill="#14532d" font-size="15" font-weight="700">&#128172;  WhatsApp</text>
<text x="260" y="842" text-anchor="middle" fill="#64748b" font-size="12">All Indian scripts supported</text>
<text x="260" y="860" text-anchor="middle" fill="#94a3b8" font-size="11">Works on any basic Android phone</text>

<!-- Delivery: SMS -->
<rect x="500" y="782" width="400" height="88" rx="12" fill="white" filter="url(#sh)"/>
<rect x="500" y="782" width="400" height="4"  rx="2"  fill="#0891b2"/>
<text x="700" y="820" text-anchor="middle" fill="#164e63" font-size="15" font-weight="700">&#128241;  SMS</text>
<text x="700" y="842" text-anchor="middle" fill="#64748b" font-size="12">No internet needed</text>
<text x="700" y="860" text-anchor="middle" fill="#94a3b8" font-size="11">Reaches any mobile on any network</text>

<line x1="480" y1="870" x2="480" y2="900" stroke="#94a3b8" stroke-width="2" marker-end="url(#ar)"/>

<!-- ══ STEP 6: Farmer ══ -->
<rect x="60" y="906" width="840" height="82" rx="14" fill="url(#fbg)" filter="url(#sh)"/>
<circle cx="112" cy="947" r="36" fill="rgba(255,255,255,0.06)"/>
<circle cx="848" cy="947" r="36" fill="rgba(255,255,255,0.06)"/>
<text x="480" y="932" text-anchor="middle" fill="white"   font-size="15" font-weight="800">&#128104;&#8205;&#127806;  Farmer receives the alert. Farmer acts. Before the weather arrives.</text>
<text x="480" y="954" text-anchor="middle" fill="#bfdbfe" font-size="12">Right district &#183; Right crop &#183; Right language &#183; Right time &#8212; no app to install, no English needed</text>
<text x="480" y="974" text-anchor="middle" fill="#93c5fd" font-size="11">Only alerted when it matters. Silence means the week ahead is safe.</text>

<!-- Language bar -->
<rect x="60" y="1004" width="840" height="30" rx="15" fill="white" filter="url(#sh)"/>
<text x="148" y="1023" fill="#7c3aed" font-size="11.5" font-weight="700">&#128483;  11 languages:</text>
<text x="252" y="1023" fill="#475569" font-size="11">Hindi &#183; Marathi &#183; Telugu &#183; Kannada &#183; Punjabi &#183; Gujarati &#183; Bengali &#183; Odia &#183; Tamil &#183; Malayalam &#183; English</text>

<!-- Footer -->
<text x="480" y="1058" text-anchor="middle" fill="#94a3b8" font-size="10.5">Powered by: IMD CAP RSS &#183; Open-Meteo &#183; data.gov.in &#183; Ollama AI &#183; Twilio WhatsApp / SMS</text>
<text x="480" y="1080" text-anchor="middle" fill="#cbd5e1" font-size="10">Kisan Mausam Alert &#8212; Built for Indian farmers</text>

</svg>